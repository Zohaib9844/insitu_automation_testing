[pytest]
# ─── InSitu QA Automation ────────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Default options: verbose + short traceback + HTML report auto-generated
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --no-header

# Show test durations for anything > 1 s
log_cli       = true
log_cli_level = INFO

# Treat warnings as errors (keeps the suite clean)
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
